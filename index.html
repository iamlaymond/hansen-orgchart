<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>航昇關係企業組織圖 - 專業版</title>
<style>
  :root {
    --accent-blue: #3b6fba;
    --neon-shadow: 0 0 15px rgba(59, 111, 186, 0.4);
    --bg-dark: #0f1117;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg-dark);
    font-family: 'Noto Sans TC', 'Microsoft JhengHei', sans-serif;
    height: 100vh;
    overflow: hidden; /* 防止原生捲軸干擾縮放 */
    color: #e2e4f0;
  }

  /* ── 控制列 ── */
  .toolbar {
    position: fixed; top: 20px; left: 20px;
    z-index: 2000;
    display: flex; gap: 10px; align-items: center;
    background: rgba(26, 29, 39, 0.8);
    padding: 12px 20px;
    border-radius: 50px;
    border: 1px solid #2e3347;
    backdrop-filter: blur(10px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  }
  .search-input {
    background: #0f1117;
    border: 1px solid #3b6fba;
    color: white;
    padding: 6px 15px;
    border-radius: 20px;
    outline: none;
    font-size: 13px;
    width: 180px;
    transition: 0.3s;
  }
  .search-input:focus { box-shadow: 0 0 10px rgba(59, 111, 186, 0.5); width: 220px; }
  
  .btn {
    background: #2e3347;
    color: #c8cad4;
    border: none;
    padding: 6px 15px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 12px;
    transition: 0.2s;
  }
  .btn:hover { background: #3b6fba; color: white; }

  /* ── 畫布容器 (Zoom & Pan) ── */
  #viewport {
    width: 100vw; height: 100vh;
    cursor: grab;
    display: flex; align-items: center; justify-content: center;
  }
  #viewport:active { cursor: grabbing; }
  
  #canvas {
    transform-origin: 0 0;
    transition: transform 0.05s linear; /* 平滑縮放 */
    will-change: transform;
    padding: 200px; /* 給予足夠緩衝空間 */
  }

  .company-title { text-align: center; margin-bottom: 50px; pointer-events: none; }
  .company-title h1 { font-size: 24px; font-weight: 500; color: #e2e4f0; letter-spacing: 0.2em; text-shadow: 0 0 10px rgba(226, 228, 240, 0.3); }

  .tree-wrap { display: flex; flex-direction: column; align-items: center; }

  /* ── 霓虹卡片特效 ── */
  .card {
    border-radius: 10px;
    border: 1px solid;
    padding: 12px 20px;
    text-align: center;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
    background: #1a1d27;
  }
  .card:hover {
    transform: translateY(-5px);
    filter: brightness(1.2);
    box-shadow: var(--hover-glow); /* 動態注入變數 */
  }
  
  /* 高亮效果 (搜尋到時) */
  .card.highlight {
    border-color: #fff !important;
    box-shadow: 0 0 25px #fff, inset 0 0 10px #fff !important;
    transform: scale(1.1);
    z-index: 100;
  }

  .card-name  { font-size: 14px; font-weight: 600; }
  .card-title { font-size: 11px; margin-top: 4px; opacity: 0.8; }
  .card-arrow { font-size: 10px; margin-top: 6px; opacity: 0.5; transition: 0.3s; }
  .card-arrow.open  { transform: rotate(180deg); }

  /* ── 各部門顏色與霓虹光譜 ── */
  .c-top   { border-color:#3b6fba; --hover-glow: 0 0 20px rgba(59, 111, 186, 0.7); }
  .c-top .card-name { color: #80aee8; }

  .c-staff { border-color:#6d5dfc; --hover-glow: 0 0 20px rgba(109, 93, 252, 0.7); }
  .c-staff .card-name { color: #a898e8; }

  .c-dept  { border-color:#5ec9a8; --hover-glow: 0 0 20px rgba(94, 201, 168, 0.7); }
  .c-dept .card-name { color: #5ec9a8; }

  .c-sub   { border-color:#1e3a6e; --hover-glow: 0 0 20px rgba(30, 58, 110, 0.7); }
  
  .c-mgr   { border-color:#4a5064; --hover-glow: 0 0 15px rgba(127, 132, 153, 0.5); }
  
  .c-grp   { border-color:#e0a83a; --hover-glow: 0 0 20px rgba(224, 168, 58, 0.7); }
  .c-grp .card-name { color: #e0a83a; }

  .c-mem   { border-color:#252839; background: #11131a; --hover-glow: 0 0 15px rgba(255,255,255,0.2); }

  /* ── 連線樣式 ── */
  .v-line { width: 1px; height: 20px; background: #343a4e; align-self: center; }
  .h-row { display: flex; justify-content: center; position: relative; gap: 24px; }
  .h-row::before {
    content: ''; position: absolute; top: 0; height: 1px; background: #343a4e;
    left: var(--hl); width: var(--hw); transition: 0.32s ease;
  }

  .children-wrap {
    display: flex; flex-direction: column; align-items: center;
    overflow: hidden; max-height: 5000px; opacity: 1;
    transition: max-height 0.4s ease, opacity 0.3s ease;
  }
  .children-wrap.collapsed { max-height: 0; opacity: 0; pointer-events: none; }

  /* ── 資訊面板 ── */
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 2999; display:none; opacity:0; transition: 0.3s; }
  .overlay.show { display: block; opacity: 1; }
  .info-panel {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.9);

  }
  .info-panel.show { visibility: visible; opacity: 1; transform: translate(-50%, -50%) scale(1); }

/* ── 狀態管理 ── */
const state = {
  collapsed: new Set(),
  scale: 0.8,
  translateX: 0,
  translateY: 0,
  isDragging: false,
  startX: 0, startY: 0
};

/* ── 渲染核心 ── */
function buildNode(node, container) {
  const col = document.createElement('div');
  col.className = 'node-col';
  col.dataset.id = node.id;

  const card = document.createElement('div');
  card.className = `card ${node.color}`;
  card.id = `card-${node.id}`;
  const hasKids = node.children && node.children.length > 0;

  card.innerHTML = `
    <div class="card-name">${node.name}</div>
    ${node.title ? `<div class="card-title">${node.title}</div>` : ''}
    ${hasKids ? `<div class="card-arrow open">▾</div>` : ''}
  `;

  card.addEventListener('click', (e) => {
    e.stopPropagation();
    if (hasKids) toggleNode(node.id);
    if (!node.noPanel) showPanel(node);
  });

  col.appendChild(card);

  if (hasKids) {
    col.appendChild(Object.assign(document.createElement('div'), {className:'v-line'}));
    const wrap = document.createElement('div');
    wrap.className = 'children-wrap';
    wrap.dataset.for = node.id;

    const row = document.createElement('div');
    row.className = 'h-row';
    node.children.forEach(c => buildNode(c, row));
    wrap.appendChild(row);
    col.appendChild(wrap);
  }
  container.appendChild(col);
}

/* ── 摺疊功能 ── */
function toggleNode(id, forceState) {
  const wrap = document.querySelector(`.children-wrap[data-for="${id}"]`);
  const arrow = document.querySelector(`#card-${id} .card-arrow`);
  if (!wrap) return;

  const isCollapsing = (forceState !== undefined) ? forceState : !state.collapsed.has(id);
  
  if (isCollapsing) state.collapsed.add(id);
  else state.collapsed.delete(id);

  wrap.classList.toggle('collapsed', isCollapsing);
  if (arrow) arrow.classList.toggle('open', !isCollapsing);
  
  setTimeout(updateLines, 50);
}

function expandAll() {
  state.collapsed.clear();
  document.querySelectorAll('.children-wrap').forEach(el => el.classList.remove('collapsed'));
  document.querySelectorAll('.card-arrow').forEach(el => el.classList.add('open'));
  updateLines();
}

function collapseAll() {
  document.querySelectorAll('.children-wrap').forEach(el => {
    const id = el.dataset.for;
    if(id !== 'board') { // 保留最頂層
      state.collapsed.add(id);
      el.classList.add('collapsed');
    }
  });
  document.querySelectorAll('.card-arrow').forEach(el => el.classList.remove('open'));
  updateLines();
}

/* ── 連線重繪 ── */
function updateLines() {
  document.querySelectorAll('.h-row').forEach(row => {
    const cols = Array.from(row.children).filter(c => c.classList.contains('node-col'));
    if (cols.length < 2) return;
    const fc = cols[0].querySelector('.card').getBoundingClientRect();
    const lc = cols[cols.length - 1].querySelector('.card').getBoundingClientRect();
    const parentRect = row.getBoundingClientRect();
    
    // 計算相對位移，排除縮放影響
    const left = (fc.left + fc.width/2 - parentRect.left) / state.scale;
    const right = (lc.left + lc.width/2 - parentRect.left) / state.scale;
    
    row.style.setProperty('--hl', left + 'px');
    row.style.setProperty('--hw', (right - left) + 'px');
  });
}

/* ── 縮放與平移 ── */
const viewport = document.getElementById('viewport');
const canvas = document.getElementById('canvas');

viewport.addEventListener('wheel', e => {
  e.preventDefault();
  const delta = e.deltaY > 0 ? 0.9 : 1.1;
  state.scale = Math.min(Math.max(0.2, state.scale * delta), 3);
  applyTransform();
}, { passive: false });

viewport.addEventListener('mousedown', e => {
  state.isDragging = true;
  state.startX = e.clientX - state.translateX;
  state.startY = e.clientY - state.translateY;
});

window.addEventListener('mousemove', e => {
  if (!state.isDragging) return;
  state.translateX = e.clientX - state.startX;
  state.translateY = e.clientY - state.startY;
  applyTransform();
});

window.addEventListener('mouseup', () => state.isDragging = false);

function applyTransform() {
  canvas.style.transform = `translate(${state.translateX}px, ${state.translateY}px) scale(${state.scale})`;
  updateLines();
}

function resetView() {
  state.scale = 0.8;
  state.translateX = 0;
  state.translateY = 0;
  applyTransform();
}

/* ── 搜尋功能 ── */
function handleSearch(e) {
  const val = e.target.value.trim().toLowerCase();
  document.querySelectorAll('.card').forEach(c => c.classList.remove('highlight'));
  
  if (!val) return;

  const findAndOpen = (nodes) => {
    let found = false;
    for (const n of nodes) {
      const match = n.name.toLowerCase().includes(val) || (n.title && n.title.toLowerCase().includes(val));
      if (match) {
        document.getElementById(`card-${n.id}`).classList.add('highlight');
        found = true;
      }
      const childFound = n.children ? findAndOpen(n.children) : false;
      if (childFound || match) {
        if(n.children) toggleNode(n.id, false); // 打開父層
        found = true;
      }
    }
    return found;
  };

  findAndOpen(DATA);
}

/* ── 面板控制 ── */
function showPanel(node) {
  document.getElementById('pname').textContent = node.name;
  document.getElementById('ptitle').textContent = node.title || '部門節點';
  document.getElementById('overlay').classList.add('show');
  document.getElementById('panel').classList.add('show');
}
function closePanel() {
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('panel').classList.remove('show');
}

/* ── 初始化 ── */
const treeEl = document.getElementById('tree');
DATA.forEach(n => buildNode(n, treeEl));
setTimeout(() => {
  applyTransform();
  updateLines();
}, 100);
window.addEventListener('resize', updateLines);
</script>
</body>
