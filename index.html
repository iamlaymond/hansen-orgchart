<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>航昇關係企業組織圖 - 專業版</title>
<style>
  :root {
    --accent-blue: #3b6fba;
    --bg-dark: #0f1117;
    /* 全局字體基礎大小已提升 */
    --base-font-size: 34px; 
    --title-font-size: 28px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg-dark);
    font-family: 'Noto Sans TC', 'Microsoft JhengHei', sans-serif;
    height: 100vh;
    overflow: hidden;
    color: #e2e4f0;
  }

  /* ── 工具列 ── */
  .toolbar {
    position: fixed; top: 20px; left: 20px;
    z-index: 2000;
    display: flex; gap: 15px; align-items: center;
    background: rgba(26, 29, 39, 0.8);
    padding: 15px 25px;
    border-radius: 50px;
    border: 1px solid #2e3347;
    backdrop-filter: blur(10px);
  }
  .search-input {
    background: #0f1117;
    border: 2px solid #3b6fba;
    color: white;
    padding: 10px 20px;
    border-radius: 25px;
    outline: none;
    font-size: 20px;
    width: 250px;
  }
  .btn {
    background: #2e3347;
    color: #c8cad4;
    border: none;
    padding: 10px 20px;
    border-radius: 25px;
    cursor: pointer;
    font-size: 18px;
  }

  /* ── 畫布 ── */
  #viewport { width: 100vw; height: 100vh; cursor: grab; display: flex; align-items: center; justify-content: center; }
  #canvas { transform-origin: 0 0; will-change: transform; padding: 600px; }

  .company-title { text-align: center; margin-bottom: 80px; pointer-events: none; }
  .company-title h1 { font-size: 52px; color: #e2e4f0; text-shadow: 0 0 15px rgba(226, 228, 240, 0.3); }
  .company-title p { font-size: 28px; color: #565869; margin-top: 15px; }

  /* ── 節點樣式 ── */
  .card {
    border-radius: 12px;
    border: 2px solid;
    padding: 12px 24px; /* 縮減 Padding 讓節點更精練 */
    text-align: center;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.3s ease;
    background: #1a1d27;
    min-width: 160px;
  }
  .card:hover { transform: translateY(-5px); box-shadow: var(--hover-glow); filter: brightness(1.2); }
  
  .card-name  { font-size: var(--base-font-size); font-weight: 600; line-height: 1.2; }
  .card-title { font-size: var(--title-font-size); margin-top: 6px; opacity: 0.8; }
  .card-arrow { font-size: 24px; margin-top: 10px; transition: 0.3s; }

  .c-top { border-color:#3b6fba; --hover-glow: 0 0 25px rgba(59, 111, 186, 0.7); }
  .c-dept { border-color:#5ec9a8; --hover-glow: 0 0 25px rgba(94, 201, 168, 0.7); }
  .c-staff { border-color:#6d5dfc; --hover-glow: 0 0 25px rgba(109, 93, 252, 0.7); }
  .c-mem { border-color:#4a5064; background: #11131a; }

  /* 幕僚單位移至右側 */
  .h-row { display: flex; justify-content: center; position: relative; gap: 40px; }
  .node-col[data-staff="true"] { order: 99; }

  .v-line { width: 2px; height: 40px; background: #343a4e; align-self: center; }
  .h-row::before {
    content: ''; position: absolute; top: 0; height: 2px; background: #343a4e;
    left: var(--hl); width: var(--hw);
  }

  .children-wrap { overflow: hidden; max-height: 8000px; transition: 0.4s; }
  .children-wrap.collapsed { max-height: 0; opacity: 0; }

  /* 資訊面板 */
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 2999; display:none; }
  .overlay.show { display: block; }
  .info-panel {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    background: #1a1d27; border: 2px solid #3b6fba; border-radius: 25px;
    padding: 40px; z-index: 3000; width: 450px; visibility: hidden; opacity: 0; transition: 0.3s;
  }
  .info-panel.show { visibility: visible; opacity: 1; }
  #pname { font-size: 44px; color: #fff; margin-bottom: 10px; }
  #ptitle { font-size: 30px; color: #3b6fba; }
</style>
</head>
<body>

<div class="toolbar">
  <input type="text" class="search-input" id="searchInput" placeholder="搜尋姓名/職稱..." onkeyup="handleSearch(event)">
  <button class="btn" onclick="expandAll()">全部展開</button>
  <button class="btn" onclick="collapseAll()">全部收合</button>
  <button class="btn" onclick="resetView()">重置視角</button>
</div>

<div id="viewport">
  <div id="canvas">
    <div class="company-title">
      <h1>航昇關係企業組織圖</h1>
      <p>2026 年 3 月</p>
    </div>
    <div class="tree-wrap" id="tree"></div>
  </div>
</div>

<div class="overlay" id="overlay" onclick="closePanel()"></div>
<div class="info-panel" id="panel">
  <h2 id="pname"></h2>
  <p id="ptitle"></p>
</div>

<script>
// 此處 DATA 沿用拆分後的數據
const DATA = [
  { id:'board', name:'董事會', color:'c-top', noPanel:true, children:[
    { id:'chairman', name:'魏程師', title:'董事長', color:'c-top', children:[
      { id:'staff-room', name:'董事長室', color:'c-staff', isStaff:true, children:[
        { id:'asst', name:'祝彩蘋', title:'董事長特助', color:'c-mem' },
        { id:'sec',  name:'孔振蕊', title:'董事長秘書', color:'c-mem' },
      ]},
      { id:'gm', name:'謝淑瑤', title:'總經理', color:'c-top', children:[
        { id:'mgmt', name:'管理部', color:'c-staff', isStaff:true, children:[
          { id:'comp1', name:'孔振蕊', title:'合規', color:'c-mem' },
          { id:'comp2', name:'李一中', title:'合規', color:'c-mem' },
          { id:'it',    name:'謝佩芬', title:'資訊組副理', color:'c-mem' },
          { id:'ga',    name:'魏嘉俊', title:'總務／人事行政', color:'c-mem' },
        ]},
        { id:'shipping', name:'船務代理處', color:'c-dept', children:[
          { id:'agency', name:'總代理部', color:'c-dept', children:[
            { id:'op-vp', name:'孔振蕊', title:'船務操作副總', color:'c-top', children:[
               { id:'op-m1', name:'林虹君', title:'船務操作協理', color:'c-mem' }
            ]}
          ]}
        ]}
      ]}
    ]}
  ]}
];

const state = { scale: 0.45, translateX: 0, translateY: 0 };

function buildNode(node, container) {
  const col = document.createElement('div');
  col.className = 'node-col';
  col.dataset.id = node.id;
  if (node.isStaff) col.dataset.staff = "true";

  const card = document.createElement('div');
  card.className = `card ${node.color}`;
  card.id = `card-${node.id}`;
  const hasKids = node.children && node.children.length > 0;

  card.innerHTML = `
    <div class="card-name">${node.name}</div>
    ${node.title ? `<div class="card-title">${node.title}</div>` : ''}
    ${hasKids ? `<div class="card-arrow">▾</div>` : ''}
  `;

  card.onclick = (e) => {
    e.stopPropagation();
    if (hasKids) toggleNode(node.id);
    if (!node.noPanel) showPanel(node);
  };

  col.appendChild(card);
  if (hasKids) {
    col.appendChild(Object.assign(document.createElement('div'), {className:'v-line'}));
    const wrap = document.createElement('div');
    wrap.className = 'children-wrap';
    wrap.dataset.for = node.id;
    const row = document.createElement('div');
    row.className = 'h-row';
    node.children.forEach(c => buildNode(c, row));
    wrap.appendChild(row);
    col.appendChild(wrap);
  }
  container.appendChild(col);
}

function toggleNode(id) {
  const wrap = document.querySelector(`.children-wrap[data-for="${id}"]`);
  wrap.classList.toggle('collapsed');
  setTimeout(updateLines, 50);
}

function updateLines() {
  document.querySelectorAll('.h-row').forEach(row => {
    const cols = Array.from(row.children).filter(c => c.classList.contains('node-col'));
    if (cols.length < 2) return;
    const cards = cols.map(c => c.querySelector('.card').getBoundingClientRect());
    const parentRect = row.getBoundingClientRect();
    const left = (cards[0].left + cards[0].width/2 - parentRect.left) / state.scale;
    const right = (cards[cards.length-1].left + cards[cards.length-1].width/2 - parentRect.left) / state.scale;
    row.style.setProperty('--hl', left + 'px');
    row.style.setProperty('--hw', (right - left) + 'px');
  });
}

function handleSearch(e) {
    const val = e.target.value.trim().toLowerCase();
    document.querySelectorAll('.card').forEach(c => c.classList.remove('highlight'));
    if (!val) return;
    document.querySelectorAll('.card').forEach(c => {
        if (c.textContent.toLowerCase().includes(val)) {
            c.classList.add('highlight');
        }
    });
}

function showPanel(node) {
  document.getElementById('pname').textContent = node.name;
  document.getElementById('ptitle').textContent = node.title || '';
  document.getElementById('overlay').classList.add('show');
  document.getElementById('panel').classList.add('show');
}
function closePanel() {
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('panel').classList.remove('show');
}

// 縮放平移邏輯
const viewport = document.getElementById('viewport');
const canvas = document.getElementById('canvas');
viewport.onwheel = e => {
  e.preventDefault();
  state.scale *= (e.deltaY > 0 ? 0.9 : 1.1);
  apply();
};

function apply() {
  canvas.style.transform = `translate(${state.translateX}px, ${state.translateY}px) scale(${state.scale})`;
  updateLines();
}

function resetView() {
    state.scale = 0.45; state.translateX = 0; state.translateY = 0; apply();
}

DATA.forEach(n => buildNode(n, document.getElementById('tree')));
setTimeout(apply, 200);
</script>
</body>
</html>
